version: '3.8'

services:
  mielboten:
    build:
      context: .
      dockerfile: Dockerfile.boten
      args:
        GAME_LANG: nl
        OPTIPNG_LEVEL: 0  # Set to 7 for production (slower but smaller files)
    image: mielboten:latest
    container_name: mielboten
    ports:
      - "8082:80"
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
